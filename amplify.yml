version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
redirects:
  - source: '/seller/verify-email/'
    target: '/seller/verify-email'
    status: '301'
  - source: '/buyer/verify-email/'
    target: '/buyer/verify-email'
    status: '301'
